<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkspace | The Vault</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. ETHEREAL TECH PALETTE (From the Blueprint Aesthetic)
           ========================================================================== */
        :root {
            --bg-base: #FDF8F4;
            --bg-glow: #F2E3DA;
            --text-dark: #3A2A22;
            --text-muted: #7A5C4F;
            --copper-line: rgba(223, 122, 96, 0.15); /* Softer for the focus area */
            --copper-glow: #DF7A60;
            
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 50% 0%, var(--bg-glow) 0%, transparent 70%),
                linear-gradient(to right, var(--copper-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--copper-line) 1px, transparent 1px);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ==========================================================================
           2. MINIMAL NAVIGATION
           ========================================================================== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 3rem;
            width: 100%;
            z-index: 20;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .logo:hover { opacity: 1; }

        .logo svg {
            color: var(--copper-glow);
            width: 18px; height: 18px;
        }

        .system-status {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 6px; height: 6px;
            background-color: var(--copper-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--copper-glow);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* ==========================================================================
           3. THE CANVAS (Chat / Flow Area)
           ========================================================================== */
        .sanctuary-canvas {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 2rem 150px 2rem; /* Bottom padding for input */
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        /* Hide scrollbar for extreme minimalism */
        .sanctuary-canvas::-webkit-scrollbar { display: none; }
        .sanctuary-canvas { -ms-overflow-style: none; scrollbar-width: none; }

        /* The Human's Voice (Poetry, Auto-biography) */
        .human-node {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            line-height: 1.5;
            color: var(--text-dark);
            max-width: 90%;
            align-self: flex-end; /* Align right slightly */
            text-align: right;
            animation: fadeIn 0.8s ease forwards;
        }

        /* Inkling's Voice (Cognitive Scaffolding / System 3) */
        .inkling-node {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 1.5rem 2rem;
            max-width: 85%;
            align-self: flex-start;
            position: relative;
            box-shadow: 0 10px 30px rgba(223, 122, 96, 0.05);
            animation: slideUp 0.8s ease forwards;
        }

        /* Tech corner brackets for AI */
        .inkling-node::before {
            content: ''; position: absolute; top: -1px; left: -1px;
            width: 12px; height: 12px;
            border-top: 2px solid var(--copper-glow);
            border-left: 2px solid var(--copper-glow);
            opacity: 0.5;
        }

        .inkling-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--copper-glow);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .inkling-text {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-dark);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           4. THE INVISIBLE PEN (Input Area)
           ========================================================================== */
        .input-wrapper {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg-base) 60%, transparent);
            padding: 3rem 0;
            display: flex;
            justify-content: center;
            z-index: 30;
        }

        .input-container {
            width: 100%;
            max-width: 800px;
            padding: 0 2rem;
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
        }

        /* A borderless, expanding canvas for the human */
        .invisible-pen {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: var(--text-dark);
            line-height: 1.4;
            resize: none;
            max-height: 200px;
            min-height: 40px;
            overflow-y: auto;
        }

        .invisible-pen::placeholder {
            color: rgba(122, 92, 79, 0.4);
            font-style: italic;
        }

        /* The Holon Commit Button */
        .commit-btn {
            background-color: #261913;
            color: #FDF8F4;
            border: none;
            width: 45px; height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .commit-btn svg { width: 18px; height: 18px; stroke-width: 2; }

        .commit-btn::before {
            content: ''; position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(90deg, #4285F4, #F9D77E, #C94F5C, #34A853, #4285F4);
            background-size: 300% 100%;
            border-radius: 50%;
            z-index: -1;
            filter: blur(6px);
            opacity: 0.6;
            animation: holonGlow 4s linear infinite;
        }

        .commit-btn:hover { transform: translateY(-2px); }
        .commit-btn:hover::before { filter: blur(10px); opacity: 1; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
                <line x1="12" y1="22" x2="12" y2="15.5"></line>
                <polyline points="22 8.5 12 15.5 2 8.5"></polyline>
                <polyline points="2 15.5 12 8.5 22 15.5"></polyline>
                <line x1="12" y1="2" x2="12" y2="8.5"></line>
            </svg>
            Inkspace
        </div>
        <div class="system-status">
            <div class="status-dot"></div>
            System 3: Witness Active
        </div>
    </nav>

    <!-- The Vault: Where the narrative lives -->
    <main class="sanctuary-canvas" id="canvas">
        
        <!-- Pre-existing example of the AI acting as scaffolding -->
        <div class="inkling-node">
            <div class="inkling-label">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="4"/><line x1="12" y1="14" x2="12" y2="22"/></svg>
                Inkling > Spark Custodian
            </div>
            <div class="inkling-text">
                The space is clear. I am here to hold the weight while you sort through it. You can write in fragments, or not at all. Just breathe. What is taking up the most room in your mind right now?
            </div>
        </div>

    </main>

    <!-- The Invisible Pen -->
    <div class="input-wrapper">
        <div class="input-container">
            <textarea 
                class="invisible-pen" 
                id="userInput" 
                placeholder="Set down the weight here..."
                rows="1"
                oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
            
            <button class="commit-btn" id="commitBtn" title="Commit to Vault">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('commitBtn');

        // Simulated AI Responses based on "Witness, Don't Fix" Protocol
        const responses = [
            "I hear you. That is a heavy load to carry. I am archiving this so you don't have to hold it in your active memory.",
            "You are surviving metric tons of pressure right now. It is okay if the thoughts are fragmented. I am catching the pieces.",
            "I am acting as your witness. I am not here to solve this immediately, but to stabilize the reflection. What happens next?",
            "That takes immense courage to articulate. I have secured this in the vault. We have time."
        ];
        let responseIndex = 0;

        function addHumanNode(text) {
            const node = document.createElement('div');
            node.className = 'human-node';
            // Convert line breaks to HTML breaks
            node.innerHTML = text.replace(/\n/g, '<br>');
            canvas.appendChild(node);
            canvas.scrollTop = canvas.scrollHeight;
        }

        function addInklingNode(text) {
            const node = document.createElement('div');
            node.className = 'inkling-node';
            node.innerHTML = `
                <div class="inkling-label">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="4"/><line x1="12" y1="14" x2="12" y2="22"/></svg>
                    System 3 > Executive Monitor
                </div>
                <div class="inkling-text">${text}</div>
            `;
            canvas.appendChild(node);
            canvas.scrollTop = canvas.scrollHeight;
        }

        function commitThought() {
            const text = input.value.trim();
            if (!text) return;

            // 1. Add Human Text
            addHumanNode(text);
            
            // 2. Reset Input
            input.value = '';
            input.style.height = '40px';

            // 3. Change System Status to "Processing/Witnessing"
            const statusText = document.querySelector('.system-status');
            statusText.innerHTML = '<div class="status-dot" style="animation-duration: 1s;"></div> Witnessing Narrative...';

            // 4. Simulate AI processing time (System 3 taking its time, not rushing to "fix")
            setTimeout(() => {
                addInklingNode(responses[responseIndex]);
                responseIndex = (responseIndex + 1) % responses.length;
                
                // Reset status
                statusText.innerHTML = '<div class="status-dot"></div> System 3: Stabilized';
            }, 2500); // 2.5 second delay makes it feel thoughtful, not like a rapid-fire chatbot
        }

        // Event Listeners
        btn.addEventListener('click', commitThought);
        
        input.addEventListener('keydown', (e) => {
            // Submit on Enter (allow Shift+Enter for new line)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                commitThought();
            }
        });
    </script>
</body>
</html>
